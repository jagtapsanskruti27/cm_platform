<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0b0f1a;
            --surface:   #131929;
            --surface2:  #1a2235;
            --border:    #222d44;
            --accent:    #4f8cff;
            --accent2:   #a259ff;
            --gold:      #f5c842;
            --text:      #e8edf8;
            --muted:     #7a8bab;
            --danger:    #ff5a6e;
            --success:   #3ddcac;
            --radius:    14px;
            --nav-h:     70px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Noise overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: rgba(11,15,26,0.85);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 0 12px var(--accent);
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.6; transform: scale(0.8); }
        }

        .nav-links { display: flex; align-items: center; gap: 6px; }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .nav-links a:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .nav-links a.active {
            color: var(--accent);
            background: rgba(79,140,255,0.1);
        }

        .nav-cta {
            background: linear-gradient(135deg, var(--accent), var(--accent2)) !important;
            color: white !important;
            padding: 8px 20px !important;
            font-weight: 600 !important;
        }

        .nav-cta:hover {
            opacity: 0.88;
            background: linear-gradient(135deg, var(--accent), var(--accent2)) !important;
        }

        /* ── PAGE WRAPPER ── */
        .page {
            min-height: 100vh;
            padding-top: var(--nav-h);
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px;
        }

        /* ── FORM ELEMENTS ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,140,255,0.15);
        }

        .form-group input::placeholder { color: var(--muted); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 28px;
            border-radius: 10px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            letter-spacing: 0.01em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(79,140,255,0.3);
        }

        .btn-ghost {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-ghost:hover {
            border-color: var(--muted);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: rgba(255,90,110,0.12);
            border: 1px solid rgba(255,90,110,0.3);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(255,90,110,0.2);
        }

        /* ── ERROR / SUCCESS ── */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-error {
            background: rgba(255,90,110,0.1);
            border: 1px solid rgba(255,90,110,0.25);
            color: var(--danger);
        }

        .alert-success {
            background: rgba(61,220,172,0.1);
            border: 1px solid rgba(61,220,172,0.25);
            color: var(--success);
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .anim-1 { animation: fadeUp 0.55s ease both; }
        .anim-2 { animation: fadeUp 0.55s ease 0.1s both; }
        .anim-3 { animation: fadeUp 0.55s ease 0.2s both; }
        .anim-4 { animation: fadeUp 0.55s ease 0.3s both; }
        .anim-5 { animation: fadeUp 0.55s ease 0.4s both; }

        /* ── BADGE ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-blue  { background: rgba(79,140,255,0.15); color: var(--accent); }
        .badge-purple{ background: rgba(162,89,255,0.15); color: var(--accent2); }
        .badge-gold  { background: rgba(245,200,66,0.15); color: var(--gold); }
        .badge-green { background: rgba(61,220,172,0.15); color: var(--success); }

        /* ── FOOTER ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: auto;
        }

        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--text); }
    </style>
</head>

<body>

<nav>
    <a href="/" class="nav-logo">
        <span class="nav-logo-dot"></span>
        Nexus
    </a>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="/feed/">Feed</a>
            <a href="/create-post/">Create Post</a>
            <a href="/chat/">Chat</a>
            <a href="/profile/">Profile</a>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/">Home</a>
            <a href="/register/">Register</a>
            <a href="/login/">Login</a>
            <a href="/register/" class="btn nav-cta">Join Now</a>
        {% endif %}
    </div>
</nav>

<div class="page">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <span>© 2025 Nexus Community. Built with passion.</span>
    <div style="display:flex;gap:20px;">
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
        <a href="#">Help</a>
    </div>
</footer>

</body>
</html>
